name: CI
run-name: ${{ github.event.head_commit.message || github.event.pull_request.title || github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

env:
  NODE_VERSION: "22"

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    env:
      # Required by prisma.config.ts when loading config (e.g. prisma generate); not used for connections.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test:run

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-unit

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      BETTER_AUTH_SECRET: "ci-secret-min-32-chars-long-for-e2e"
      BETTER_AUTH_URL: "http://localhost:3000"
      DEMO_PASSWORD: "Demo@395762@"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Start PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema
        run: npx prisma db push

      - name: Build
        run: npm run build
        env:
          BETTER_AUTH_URL: "http://localhost:3000"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Add swap space
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        continue-on-error: true
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results and traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
