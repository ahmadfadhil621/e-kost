version: 2

# npm security updates are handled by Dependabot Security Updates (repo setting),
# NOT by version updates below. Do NOT add an npm section here — it would open
# PRs for every new version, not just security fixes.

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci):"
    labels:
      - "dependencies"
      - "ci"
