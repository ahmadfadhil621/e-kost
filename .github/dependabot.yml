version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"
    # Security updates only — no version bumps
    # Dependabot security updates are enabled separately in repo settings,
    # but this config ensures PRs target the right branch and follow our rules.
    target-branch: "main"
    commit-message:
      prefix: "fix(deps):"
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci):"
    labels:
      - "dependencies"
      - "ci"
